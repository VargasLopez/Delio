<!DOCTYPE html>
<html lang="es" class="h-full scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Delio | Directorio P2P de Oficios y Mandados en México</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Encuentra mandados, trabajos rápidos y oficios locales en tu colonia. Conexión directa peer-to-peer sin comisiones, sin intermediarios y con pagos en efectivo o SPEI.">
  <meta name="keywords" content="empleo, mandados, oficios, méxico, peer-to-peer, SPEI, bolsa de trabajo local, colonia, delegacion">
  <meta name="author" content="Delio PWA">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Delio | Directorio de Mandados y Oficios Sin Comisiones">
  <meta property="og:description" content="La plataforma de mandados y oficios 100% gratuita para México. Acuerda pagos directamente en efectivo o transferencia.">
  <meta property="og:image" content="/icon.png">

  <!-- iOS PWA Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Delio">
  <link rel="apple-touch-icon" href="/icon.png">

  <!-- PWA Manifest & Favicon -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon.png">

  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
              950: '#042f2e',
            },
            accent: {
              50: '#fffbeb',
              100: '#fef3c7',
              200: '#fde68a',
              300: '#fcd34d',
              400: '#fbbf24',
              500: '#f59e0b',
              600: '#d97706',
              700: '#b45309',
              800: '#92400e',
              900: '#78350f',
              950: '#451a03',
            },
            darkbg: {
              light: '#1e293b',
              DEFAULT: '#0f172a',
              dark: '#020617',
            }
          },
          fontFamily: {
            sans: ['"Outfit"', '"Inter"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'glass-light': '0 8px 32px 0 rgba(31, 38, 135, 0.08)',
            'glass-dark': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
          }
        }
      }
    }
  </script>

  <!-- Import Map to resolve bare imports (like @supabase/supabase-js) directly in browser -->
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/+esm"
      }
    }
  </script>

  <!-- Custom animations and overrides -->
  <link rel="stylesheet" href="/src/assets/styles.css">
  
  <!-- Global Error Handler for Debugging -->
  <script>
    window.addEventListener('error', function(e) {
      console.error('[Delio Global Error Capture]', e);
      const appEl = document.getElementById('app');
      if (appEl) {
        appEl.innerHTML = `
          <div class="flex-grow flex items-center justify-center p-6 text-center animate-fade-in relative z-50">
            <div class="p-6 max-w-md w-full bg-white border-2 border-rose-250 rounded-2xl shadow-xl border-rose-250 relative z-50 text-left">
              <div class="flex items-center gap-3 text-rose-600 mb-4">
                <i class="fa-solid fa-circle-exclamation text-2xl animate-bounce"></i>
                <h2 class="font-outfit font-black text-lg">Error de Inicialización</h2>
              </div>
              <p class="text-xs font-bold text-slate-700 mb-2">Se detectó un error al cargar la aplicación:</p>
              <pre class="bg-rose-50 text-rose-700 p-4 rounded-xl text-[10px] font-mono overflow-auto max-h-60 border border-rose-100 whitespace-pre-wrap select-all">${e.message || 'Error Desconocido'}\\n\\nArchivo: ${e.filename || 'N/A'}\\nLínea: ${e.lineno || 'N/A'}, Columna: ${e.colno || 'N/A'}\\n\\nStack:\\n${e.error && e.error.stack ? e.error.stack : 'No disponible'}</pre>
              <button onclick="window.location.reload()" class="mt-4 w-full py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs transition-all shadow-sm">
                Recargar Página
              </button>
            </div>
          </div>
        `;
      }
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('[Delio Global Rejection Capture]', e);
      const appEl = document.getElementById('app');
      if (appEl) {
        appEl.innerHTML = `
          <div class="flex-grow flex items-center justify-center p-6 text-center animate-fade-in relative z-50">
            <div class="p-6 max-w-md w-full bg-white border-2 border-rose-250 rounded-2xl shadow-xl relative z-50 text-left">
              <div class="flex items-center gap-3 text-rose-600 mb-4">
                <i class="fa-solid fa-circle-exclamation text-2xl animate-bounce"></i>
                <h2 class="font-outfit font-black text-lg">Promesa Rechazada</h2>
              </div>
              <p class="text-xs font-bold text-slate-700 mb-2">Una operación de base de datos o servicio falló:</p>
              <pre class="bg-rose-50 text-rose-700 p-4 rounded-xl text-[10px] font-mono overflow-auto max-h-60 border border-rose-100 whitespace-pre-wrap select-all">${e.reason && e.reason.message ? e.reason.message : e.reason}\\n\\nStack:\\n${e.reason && e.reason.stack ? e.reason.stack : 'No disponible'}</pre>
              <button onclick="window.location.reload()" class="mt-4 w-full py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs transition-all shadow-sm">
                Recargar Página
              </button>
            </div>
          </div>
        `;
      }
    });
  </script>
</head>
<body class="h-full bg-slate-50 text-slate-900 font-sans selection:bg-brand-500 selection:text-white overflow-x-hidden antialiased">

  <!-- Background Ambient Glows (Light Theme) -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[40%] -left-[20%] w-[80%] h-[80%] rounded-full bg-brand-500/5 blur-[120px] animate-pulse" style="animation-duration: 8s;"></div>
    <div class="absolute -bottom-[40%] -right-[20%] w-[80%] h-[80%] rounded-full bg-accent-500/3 blur-[120px] animate-pulse" style="animation-duration: 12s;"></div>
  </div>

  <!-- Main SPA Layout Container -->
  <div id="app" class="relative z-10 flex flex-col min-h-full">
    <!-- Initial Loading State (will be overwritten by components) -->
    <div class="flex-grow flex flex-col items-center justify-center p-6 text-center animate-fade-in">
      <div class="relative w-20 h-20 mb-6">
        <!-- Modern Premium Spinner -->
        <div class="absolute inset-0 rounded-full border-4 border-slate-800 border-t-brand-500 animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-4 border-slate-900 border-b-accent-500 animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
        <div class="absolute inset-0 flex items-center justify-center p-3">
          <img src="/icon.png" alt="Delio Icon" class="w-full h-full object-contain animate-pulse">
        </div>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-brand-400 via-brand-200 to-accent-300 bg-clip-text text-transparent font-outfit mb-2">DELIO</h1>
      <p class="text-sm text-slate-400 max-w-xs leading-relaxed">Conectando el trabajo de confianza en México sin intermediarios ni comisiones...</p>
    </div>
  </div>

  <!-- Bootstrapper Application Script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
